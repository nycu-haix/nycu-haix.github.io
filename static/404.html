<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting...</title>
</head>
<body>
  <p>Redirecting...</p>
  <script>
    (function () {
      var path = window.location.pathname || "/";
      var segments = path.split("/").filter(Boolean);
      var username = segments.length ? segments[segments.length - 1] : "";
      var target = username ? "/?member=" + encodeURIComponent(username) : "/";
      window.location.replace(target);
    })();
  </script>
</body>
</html>
